<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TipTop Cafe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fdfdfd;
      color: #333;
    }

    header {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    header video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s, transform 0.3s;
    }

    nav a:hover {
      color: #ffcc00;
      transform: scale(1.1);
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    .hero-text h1 {
      font-size: 4rem;
      margin: 0;
    }

    .hero-text p {
      font-size: 1.5rem;
    }

    .content {
      padding: 40px;
      text-align: center;
    }

    /* Scroll-to-top button */
    #scrollTopBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ffcc00;
      border: none;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: none;
      transition: transform 0.3s;
    }

    #scrollTopBtn:hover {
      transform: rotate(360deg);
    }

    /* Surprise button */
    #surpriseBtn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #ff6600;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: background 0.3s;
    }

    #surpriseBtn:hover {
      background: #cc3300;
    }
  </style>
</head>
<body>
  <header>
    <video autoplay muted loop>
      <source src="assets/Hero Video Loop.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <div class="hero-text">
      <h1>Welcome to TipTop Cafe</h1>
      <p>Where every sip feels special</p>
    </div>
  </header>

  <nav>
    <a href="#menu">Menu</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="content">
    <h2 id="menu">Our Menu</h2>
    <p>Delicious coffee, pastries, and more!</p>

    <h2 id="about">About Us</h2>
    <p>TipTop Cafe is your cozy corner for relaxation and great taste.</p>

    <h2 id="contact">Contact</h2>
    <p>Reach us at hello@tiptopcafe.com</p>

    <button id="surpriseBtn">Surprise Me!</button>
  </div>

  <button id="scrollTopBtn">↑</button>

  <script>
    // Scroll-to-top button functionality
    const scrollTopBtn = document.getElementById("scrollTopBtn");
    window.onscroll = function() {
      if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
        scrollTopBtn.style.display = "block";
      } else {
        scrollTopBtn.style.display = "none";
      }
    };
    scrollTopBtn.onclick = function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // Surprise button functionality
    const surpriseBtn = document.getElementById("surpriseBtn");
    surpriseBtn.onclick = function() {
      const colors = ["#ffe6e6", "#e6ffe6", "#e6f0ff", "#fff0e6", "#f9e6ff"];
      document.body.style.background = colors[Math.floor(Math.random() * colors.length)];
    };
  </script>
</body>
</html>
